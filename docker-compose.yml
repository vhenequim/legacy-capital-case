services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # A imagem do Qdrant não tem curl/wget; usa o TCP healthcheck embutido
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: legacy
      POSTGRES_PASSWORD: legacy
      POSTGRES_DB: legacy_retrieval
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legacy"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      DATABASE_URL: postgresql://legacy:legacy@postgres:5432/legacy_retrieval
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  qdrant_data:
  postgres_data:
