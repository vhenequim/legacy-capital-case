# Investor Relations site configs for Case A hyperscalers.
# Each entry defines seed pages and link patterns — NOT site-specific parsers.
# Add a new company by copying a block and adjusting URLs.

MSFT:
  base_url: https://www.microsoft.com
  seed_urls:
    - https://www.microsoft.com/en-us/investor/earnings
    - https://www.microsoft.com/en-us/investor/events
  allowed_domains:
    - microsoft.com
    - cloudfront.net
    - aka.ms
  link_patterns:
    - earnings
    - latestearnings
    - press-release
    - presentation
    - transcript
    - .pdf
  max_documents: 20

